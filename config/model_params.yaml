# FraudGuard — Model Hyperparameters
# All hyperparameters must live here. No magic numbers in notebooks.

split:
  test_size: 0.2
  random_state: 42
  stratify: true

smote:
  random_state: 42
  k_neighbors: 5

logistic_regression:
  random_state: 42
  max_iter: 1000
  C: 1.0
  solver: lbfgs

random_forest:
  random_state: 42
  n_estimators: 100
  max_depth: null
  min_samples_split: 2
  min_samples_leaf: 1
  class_weight: balanced

xgboost:
  random_state: 42
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  scale_pos_weight: 577  # neg/pos ratio from train set: 227451 / 394
